<head>

<title>世界杯早鸟配套 | BetCity666</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Anton&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { min-height:100vh; background:#09111f; font-family:'Noto Sans SC',sans-serif; overflow-x:hidden; }
.page { max-width:480px; margin:0 auto; padding:0 0 48px; }

.hero-wrap { position:relative; width:100%; }
.hero-wrap img { width:100%; display:block; }
.hero-wrap::after { content:''; position:absolute; bottom:0; left:0; right:0; height:50%; background:linear-gradient(transparent,#09111f); pointer-events:none; }
.hero-logo { position:absolute; top:12px; left:14px; z-index:2; display:flex; align-items:center; gap:7px; background:rgba(0,0,0,0.5); border:1px solid rgba(255,130,0,0.5); border-radius:24px; padding:6px 16px; }
.hero-logo span { font-family:Anton,sans-serif; font-size:16px; color:#FF8200; letter-spacing:1px; }
.dot { width:7px; height:7px; border-radius:50%; background:#FF8200; animation:blink 1.8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

.content { padding:0 16px; }
.title-wrap { text-align:center; padding:6px 0 18px; }
.title-main { font-family:Anton,sans-serif; font-size:24px; letter-spacing:3px; color:#fff; margin-bottom:5px; }
.title-sub { font-size:12px; color:rgba(255,255,255,0.4); letter-spacing:1.5px; }
.orange-line { height:2px; background:linear-gradient(90deg,transparent,#FF8200 30%,#FFD700 65%,transparent); margin:10px auto 0; max-width:260px; border-radius:2px; }

.perks { display:flex; justify-content:space-around; background:rgba(255,255,255,0.03); border:1px solid rgba(255,130,0,0.15); border-radius:14px; padding:14px 8px; margin-bottom:20px; gap:4px; }
.perk { text-align:center; flex:1; }
.perk-icon { font-size:22px; margin-bottom:4px; }
.perk-text { font-size:11px; color:rgba(255,255,255,0.5); line-height:1.4; }
.perk-text b { color:#FFB800; display:block; }

.form-card { background:rgba(255,255,255,0.035); border:1px solid rgba(255,130,0,0.2); border-radius:18px; padding:28px 22px; position:relative; overflow:hidden; }
.form-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,#FF6B00,#FFD700,#E53E3E); }
.form-heading { font-size:15px; font-weight:700; color:rgba(255,255,255,0.8); margin-bottom:20px; display:flex; align-items:center; gap:8px; }
.form-heading::after { content:''; flex:1; height:1px; background:rgba(255,130,0,0.2); }
.form-group { margin-bottom:16px; }
.form-label { display:flex; align-items:center; gap:7px; font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:8px; }
.licon { color:#FF8200; font-size:14px; }
.form-input { width:100%; background:rgba(255,255,255,0.055); border:1px solid rgba(255,255,255,0.1); border-radius:11px; padding:13px 15px; font-size:15px; color:#fff; font-family:'Noto Sans SC',sans-serif; outline:none; transition:all .25s; }
.form-input::placeholder { color:rgba(255,255,255,0.2); }
.form-input:focus { border-color:#FF8200; background:rgba(255,130,0,0.07); box-shadow:0 0 0 3px rgba(255,130,0,0.12); }
.phone-row { display:flex; gap:8px; }
.phone-prefix { background:rgba(255,255,255,0.055); border:1px solid rgba(255,255,255,0.1); border-radius:11px; padding:13px 13px; color:rgba(255,255,255,0.65); font-size:14px; white-space:nowrap; display:flex; align-items:center; gap:5px; flex-shrink:0; }

.submit-btn { width:100%; padding:16px; background:linear-gradient(135deg,#FF5500 0%,#FF8200 50%,#FFD000 100%); border:none; border-radius:13px; font-family:Anton,sans-serif; font-size:20px; letter-spacing:2px; color:#1a0600; cursor:pointer; transition:all .3s; margin-top:8px; box-shadow:0 5px 22px rgba(255,130,0,0.4); }
.submit-btn:hover { transform:translateY(-2px); box-shadow:0 9px 30px rgba(255,130,0,0.55); }
.submit-btn:active { transform:translateY(0); }
.submit-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }

.msg { display:none; align-items:center; gap:9px; padding:13px 15px; border-radius:10px; font-size:14px; margin-top:13px; }
.msg.success { background:rgba(0,200,100,.10); border:1px solid rgba(0,200,100,.28); color:#4ade80; }
.msg.error { background:rgba(220,50,50,.10); border:1px solid rgba(220,50,50,.28); color:#f87171; }

.spinner { display:inline-block; width:17px; height:17px; border:2px solid rgba(26,6,0,.3); border-top-color:#1a0600; border-radius:50%; animation:spin .55s linear infinite; vertical-align:middle; margin-right:5px; }
@keyframes spin { to { transform:rotate(360deg); } }

.footer-note { text-align:center; margin-top:20px; padding:0 16px; font-size:11px; color:rgba(255,255,255,.22); line-height:1.8; }
</style>

<script>
var MAKE_URL   = 'https://hook.eu1.make.com/gbnay2rmkc2o9qf5os427vvw6jzidnu0';
var TG_URL     = 'https://t.me/XiaoFengGe_Bot';
 
function getMYTime() {
  var now = new Date();
  var t = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Kuala_Lumpur' }));
  function p(n) { return String(n).padStart(2,'0'); }
  return p(t.getDate())+'/'+p(t.getMonth()+1)+'/'+t.getFullYear()+' '+p(t.getHours())+':'+p(t.getMinutes())+':'+p(t.getSeconds())+' (GMT+8)';
}
 
// ★ 新增：生成唯一追踪 ID（例如 xfg_a8x3k9pq）
function generateTrackingId() {
  var chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
  var id = 'xfg_';
  for (var i = 0; i < 8; i++) {
    id += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return id;
}
 
function showErr(msg) {
  document.getElementById('errTxt').textContent = msg;
  document.getElementById('errorMsg').style.display = 'flex';
}
 
function handleSubmit() {
  var name     = document.getElementById('fname').value.trim();
  var telegram = document.getElementById('ftelegram').value.trim();
  var phone    = document.getElementById('fphone').value.trim();
  var btn      = document.getElementById('submitBtn');
 
  document.getElementById('successMsg').style.display = 'none';
  document.getElementById('errorMsg').style.display   = 'none';
 
  if (!name)                      { showErr('请填写您的姓名！'); return; }
  if (!telegram)                  { showErr('请填写您的 Telegram ID！'); return; }
  if (!phone || phone.length < 8) { showErr('请填写有效的手机号码！'); return; }
 
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 提交中...';
 
  // ★ 生成唯一追踪 ID
  var trackingId = generateTrackingId();
 
  var payload = {
    name: name,
    telegram_id: telegram,
    phone: '+60' + phone,
    timestamp: getMYTime(),
    tracking_id: trackingId,        // ★ 新增
    bot_connected: 'No'             // ★ 新增（默认未连接）
  };
 
  fetch(MAKE_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(function() {
    document.getElementById('successMsg').style.display = 'flex';
    btn.innerHTML = '✅ 已提交';
    // ★ 关键改动：跳转 URL 带上 ?start=trackingId
    setTimeout(function() {
      window.location.href = TG_URL + '?start=' + trackingId;
    }, 2000);
  }).catch(function() {
    showErr('网络错误，请稍后重试。');
    btn.disabled = false;
    btn.innerHTML = '🚀 立即提交 SUBMIT';
  });
}
 
document.addEventListener('keydown', function(e) { if (e.key === 'Enter') handleSubmit(); });
</script>

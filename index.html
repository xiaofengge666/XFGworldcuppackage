<head>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: #FFF8EE;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    color: #2B2B2B;
    line-height: 1.5;
  }
  .page {
    max-width: 480px;
    margin: 0 auto;
    background: #FFF8EE;
    padding: 0 0 40px 0;
    overflow: hidden;
  }
  @media (min-width: 768px) {
    .page {
      max-width: 760px;
      padding-bottom: 60px;
    }
  }

  /* === Hero === */
  .hero { padding: 16px 16px 0 16px; }
  .hero-img {
    width: 100%;
    border-radius: 18px;
    overflow: hidden;
    background: linear-gradient(135deg, #1E5BAA 0%, #2B7BC6 100%);
    aspect-ratio: 16 / 9;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 30px rgba(255, 130, 0, 0.20);
  }
  .hero-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .hero-img .placeholder { color: #FFFFFF; text-align: center; padding: 20px; }
  .hero-img .placeholder .big {
    font-size: 32px; font-weight: 900; margin-bottom: 8px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .hero-img .placeholder .small { font-size: 14px; opacity: 0.9; }
  @media (min-width: 768px) {
    .hero-img .placeholder .big { font-size: 44px; }
    .hero-img .placeholder .small { font-size: 18px; }
  }

  /* === Section header === */
  .sec-tag {
    text-align: center;
    margin-top: 28px;
    color: #FF8200;
    font-size: 12px;
    letter-spacing: 4px;
    font-weight: 600;
    padding: 0 16px;
  }
  .sec-tag::before, .sec-tag::after {
    content: "";
    display: inline-block;
    width: 40px;
    height: 1px;
    background: #FF8200;
    vertical-align: middle;
    margin: 0 10px;
    opacity: 0.5;
  }
  .sec-title {
    text-align: center;
    font-size: 24px;
    font-weight: 800;
    color: #2B2B2B;
    margin: 10px 16px 18px;
    line-height: 1.4;
  }
  @media (min-width: 768px) {
    .sec-title { font-size: 30px; }
  }

  /* === Package cards === */
  .packages {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 0 16px;
    margin-bottom: 8px;
    perspective: 1000px;
  }
  @media (min-width: 768px) {
    .packages {
      flex-direction: row;
      gap: 20px;
      padding: 0 24px;
    }
  }

  .pkg {
    flex: 1;
    border-radius: 20px;
    padding: 22px 18px 20px;
    position: relative;
    overflow: hidden;
    min-height: 220px;
    transform-style: preserve-3d;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                box-shadow 0.4s ease;
    cursor: pointer;
    animation: floatCard 4s ease-in-out infinite;
    will-change: transform;
  }

  /* 卡内左右分栏：文字左 / 公仔右 */
  .pkg-content {
    position: relative;
    z-index: 3;
    max-width: 62%;
  }
  .pkg-mascot {
    position: absolute;
    right: -6px;
    bottom: -6px;
    width: 42%;
    max-width: 160px;
    pointer-events: none;
    z-index: 2;
    animation: mascotBob 3s ease-in-out infinite;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,0.18));
  }
  .pkg-mascot img {
    width: 100%;
    height: auto;
    display: block;
  }
  .pkg-flagship .pkg-mascot {
    width: 46%;
    max-width: 170px;
    animation-delay: 1.5s;
  }
  @media (min-width: 768px) {
    .pkg-mascot { width: 44%; max-width: 180px; }
    .pkg-flagship .pkg-mascot { width: 48%; max-width: 190px; }
  }
  @keyframes mascotBob {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50%      { transform: translateY(-5px) rotate(1deg); }
  }
  /* 入门配套 — 浅色高光 (top) + 深色阴影 (bottom) */
  .pkg-entry {
    background: linear-gradient(180deg, #FFE9CC 0%, #FFD8A8 100%);
    box-shadow:
      /* 内嵌：上方浅色高光 */
      0 2px 0 rgba(255, 255, 255, 0.95) inset,
      0 6px 12px rgba(255, 255, 255, 0.55) inset,
      /* 内嵌：底部深色阴影 */
      0 -3px 0 rgba(120, 50, 0, 0.18) inset,
      0 -8px 14px rgba(120, 50, 0, 0.12) inset,
      /* 外阴影：底部深色 */
      0 14px 26px rgba(120, 50, 0, 0.30),
      0 4px 8px rgba(120, 50, 0, 0.18);
  }
  /* 旗舰配套 — 浅色高光 (top) + 深色阴影 (bottom) */
  .pkg-flagship {
    background: linear-gradient(180deg, #DCEBFB 0%, #B8D8F5 100%);
    box-shadow:
      /* 内嵌：上方浅色高光 */
      0 2px 0 rgba(255, 255, 255, 0.95) inset,
      0 6px 12px rgba(255, 255, 255, 0.55) inset,
      /* 内嵌：底部深色阴影 */
      0 -3px 0 rgba(10, 35, 80, 0.20) inset,
      0 -8px 14px rgba(10, 35, 80, 0.14) inset,
      /* 外阴影：底部深色 */
      0 14px 26px rgba(10, 35, 80, 0.32),
      0 4px 8px rgba(10, 35, 80, 0.20);
    animation-delay: 2s;
  }

  /* shine sweep across card */
  .pkg::after {
    content: "";
    position: absolute;
    top: 0;
    left: -75%;
    width: 50%;
    height: 100%;
    background: linear-gradient(
      120deg,
      transparent 0%,
      rgba(255,255,255,0.5) 50%,
      transparent 100%
    );
    transform: skewX(-25deg);
    animation: shineCard 5s ease-in-out infinite;
    pointer-events: none;
  }
  .pkg-flagship::after { animation-delay: 2.5s; }

  .pkg:hover, .pkg:active {
    transform: translateY(-6px) scale(1.02);
  }
  .pkg-entry:hover, .pkg-entry:active {
    box-shadow:
      0 2px 0 rgba(255, 255, 255, 1) inset,
      0 6px 12px rgba(255, 255, 255, 0.65) inset,
      0 -3px 0 rgba(120, 50, 0, 0.20) inset,
      0 -8px 14px rgba(120, 50, 0, 0.16) inset,
      0 22px 40px rgba(120, 50, 0, 0.38),
      0 8px 14px rgba(120, 50, 0, 0.24);
  }
  .pkg-flagship:hover, .pkg-flagship:active {
    box-shadow:
      0 2px 0 rgba(255, 255, 255, 1) inset,
      0 6px 12px rgba(255, 255, 255, 0.65) inset,
      0 -3px 0 rgba(10, 35, 80, 0.22) inset,
      0 -8px 14px rgba(10, 35, 80, 0.18) inset,
      0 22px 40px rgba(10, 35, 80, 0.40),
      0 8px 14px rgba(10, 35, 80, 0.26);
  }

  @keyframes floatCard {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-4px); }
  }
  @keyframes shineCard {
    0%       { left: -75%; }
    40%      { left: 125%; }
    100%     { left: 125%; }
  }

  .pkg-badge {
    display: inline-block;
    background: #FFFFFF;
    color: #FF8200;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  }
  .pkg-flagship .pkg-badge { color: #1E5BAA; }

  .pkg-amount {
    display: flex;
    align-items: baseline;
    gap: 4px;
    margin-bottom: 14px;
  }
  .pkg-amount .label {
    font-size: 14px;
    color: #6B5B45;
    font-weight: 600;
  }
  .pkg-flagship .pkg-amount .label { color: #4A6788; }
  .pkg-amount .currency {
    font-size: 18px;
    font-weight: 800;
    color: #FF8200;
  }
  .pkg-flagship .pkg-amount .currency { color: #1E5BAA; }
  .pkg-amount .number {
    font-size: 44px;
    font-weight: 900;
    color: #FF8200;
    letter-spacing: -1px;
    line-height: 1;
    text-shadow: 0 2px 0 rgba(255,255,255,0.6);
  }
  .pkg-flagship .pkg-amount .number {
    color: #1E5BAA;
    text-shadow: 0 2px 0 rgba(255,255,255,0.6);
  }

  .pkg-list { list-style: none; padding: 0; margin: 0; }
  .pkg-list li {
    font-size: 13px;
    color: #3D3D3D;
    padding: 6px 0 6px 22px;
    position: relative;
    line-height: 1.45;
  }
  .pkg-list li::before {
    content: "\2713";
    position: absolute;
    left: 0;
    top: 5px;
    color: #FF8200;
    font-weight: 900;
    font-size: 14px;
  }
  .pkg-flagship .pkg-list li::before { color: #1E5BAA; }

  /* === Form section === */
  .form-wrap {
    margin: 28px 16px 0;
    background: #FFFFFF;
    border-radius: 20px;
    padding: 24px 20px;
    box-shadow: 0 8px 28px rgba(255, 130, 0, 0.10);
  }
  @media (min-width: 768px) {
    .form-wrap {
      max-width: 480px;
      margin: 36px auto 0;
      padding: 30px 28px;
    }
  }
  .limited-tag {
    text-align: center;
    color: #FF8200;
    font-size: 11px;
    letter-spacing: 3px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .form-title {
    text-align: center;
    font-size: 20px;
    font-weight: 800;
    color: #2B2B2B;
    margin-bottom: 6px;
  }
  .form-sub {
    text-align: center;
    font-size: 13.5px;
    color: #888;
    margin-bottom: 20px;
  }
  .form-row { margin-bottom: 12px; }
  .form-label {
    font-size: 13px;
    color: #555;
    font-weight: 600;
    margin-bottom: 6px;
    display: block;
  }
  .form-input {
    width: 100%;
    padding: 13px 14px;
    border: 1.5px solid #EEE2D0;
    border-radius: 12px;
    font-size: 15px;
    background: #FFFCF6;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    font-family: inherit;
    color: #2B2B2B;
  }
  .form-input:focus {
    border-color: #FF8200;
    background: #FFFFFF;
  }
  .phone-row { display: flex; gap: 8px; align-items: stretch; }
  .phone-prefix {
    background: #FFE9CC;
    border: 1.5px solid #EEE2D0;
    border-radius: 12px;
    padding: 0 14px;
    display: flex;
    align-items: center;
    font-size: 15px;
    color: #B85800;
    font-weight: 700;
  }
  .phone-row .form-input { flex: 1; }

  /* === CTA button with sliding shimmer === */
  .submit-btn {
    width: 100%;
    margin-top: 20px;
    padding: 16px 20px;
    background: linear-gradient(135deg, #FF8200 0%, #FF6A00 100%);
    color: #FFFFFF;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(255, 130, 0, 0.40),
                0 2px 4px rgba(255, 130, 0, 0.20);
    transition: transform 0.1s, box-shadow 0.2s;
    font-family: inherit;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
    z-index: 0;
  }
  /* the sliding shimmer */
  .submit-btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(255, 255, 255, 0.55) 50%,
      transparent 100%
    );
    transform: skewX(-20deg);
    animation: btnShine 2.4s ease-in-out infinite;
    z-index: 1;
  }
  .submit-btn > * { position: relative; z-index: 2; }
  .submit-btn:active {
    transform: scale(0.98);
    box-shadow: 0 4px 10px rgba(255, 130, 0, 0.30);
  }
  .submit-btn:disabled {
    background: #CCC;
    box-shadow: none;
    cursor: not-allowed;
  }
  .submit-btn:disabled::before { display: none; }

  @keyframes btnShine {
    0%   { left: -100%; }
    60%  { left: 130%; }
    100% { left: 130%; }
  }

  .form-foot {
    text-align: center;
    margin-top: 14px;
    font-size: 12px;
    color: #AAA;
  }
  .form-foot span { margin: 0 6px; }

  /* === Messages === */
  .msg {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 12px 14px;
    border-radius: 10px;
    margin-top: 12px;
    font-size: 13.5px;
  }
  .msg.ok {
    background: #E8F8EE;
    color: #1A8E3D;
    border: 1px solid #B8E6C7;
  }
  .msg.err {
    background: #FDECEC;
    color: #C92929;
    border: 1px solid #F5B8B8;
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #FFFFFF;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* respect reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .pkg, .pkg::after, .submit-btn::before {
      animation: none !important;
    }
  }
</style>
</head>
<body>

<div class="page">

  <!-- Hero image -->
  <div class="hero">
    <div class="hero-img">
      <img src="hero_banner.png" alt="世界杯早鸟配套 首存RM1000送世界杯正版球衣" onerror="this.style.display='none'">
    </div>
  </div>

  <!-- Section header -->
  <div class="sec-tag">世界杯早鸟配套</div>
  <div class="sec-title">两种福利配套任选加入</div>

  <!-- Packages -->
  <div class="packages">
    <!-- 入门配套 RM200 -->
    <div class="pkg pkg-entry">
      <div class="pkg-content">
        <span class="pkg-badge">入门配套</span>
        <div class="pkg-amount">
          <span class="label">首存</span>
          <span class="currency">RM</span>
          <span class="number">200</span>
        </div>
        <ul class="pkg-list">
          <li>体育输返 100% 优惠券 x3</li>
          <li>体育每日 10% 首存券 x3</li>
          <li>加入小凤哥 VIP 群</li>
        </ul>
      </div>
      <!-- 橙色公仔（去背后放在这里） -->
      <div class="pkg-mascot">
        <img src="mascot_entry.png" alt="入门配套 RM200" onerror="this.style.display='none'">
      </div>
    </div>

    <!-- 旗舰配套 RM1000 -->
    <div class="pkg pkg-flagship">
      <div class="pkg-content">
        <span class="pkg-badge">旗舰配套</span>
        <div class="pkg-amount">
          <span class="label">首存</span>
          <span class="currency">RM</span>
          <span class="number">1000</span>
        </div>
        <ul class="pkg-list">
          <li>包含 RM200 所有福利</li>
          <li>一件世界杯正版球衣</li>
        </ul>
      </div>
      <!-- 古装公仔（去背后放在这里） -->
      <div class="pkg-mascot">
        <img src="mascot_flagship.png" alt="旗舰配套 RM1000" onerror="this.style.display='none'">
      </div>
    </div>
  </div>

  <!-- Form -->
  <div class="form-wrap">
    <div class="limited-tag">限时世界杯活动</div>
    <div class="form-title">填写资料</div>
    <div class="form-sub">了解更多世界杯福利的资讯</div>

    <div class="form-row">
      <label class="form-label" for="fname">姓名</label>
      <input id="fname" class="form-input" type="text" placeholder="请输入您的姓名" autocomplete="off">
    </div>

    <div class="form-row">
      <label class="form-label" for="ftelegram">Telegram ID</label>
      <input id="ftelegram" class="form-input" type="text" placeholder="例如：@yourname" autocomplete="off">
    </div>

    <div class="form-row">
      <label class="form-label" for="fphone">手机号码</label>
      <div class="phone-row">
        <div class="phone-prefix">+60</div>
        <input id="fphone" class="form-input" type="tel" placeholder="123456789" inputmode="numeric" autocomplete="off">
      </div>
    </div>

    <button id="submitBtn" class="submit-btn" onclick="handleSubmit()"><span>立即提交 SUBMIT</span></button>

    <div id="successMsg" class="msg ok">
      <span>提交成功！正在跳转去 Telegram Bot...</span>
    </div>
    <div id="errorMsg" class="msg err">
      <span id="errTxt"></span>
    </div>

    <div class="form-foot">
      <span>免费注册</span>·<span>即时分配</span>·<span>无需押金</span>
    </div>
  </div>

</div>

<script>
var MAKE_URL = 'https://hook.eu1.make.com/gbnay2rmkc2o9qf5os427vvw6jzidnu0';
var TG_URL   = 'https://t.me/XiaoFengGe_Bot';

function getMYTime() {
  var now = new Date();
  var t = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Kuala_Lumpur' }));
  function p(n) { return String(n).padStart(2,'0'); }
  return p(t.getDate())+'/'+p(t.getMonth()+1)+'/'+t.getFullYear()+' '+p(t.getHours())+':'+p(t.getMinutes())+':'+p(t.getSeconds())+' (GMT+8)';
}

function generateTrackingId() {
  var chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
  var id = 'xfg_';
  for (var i = 0; i < 8; i++) {
    id += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return id;
}

function showErr(msg) {
  document.getElementById('errTxt').textContent = msg;
  document.getElementById('errorMsg').style.display = 'flex';
}

function handleSubmit() {
  var name     = document.getElementById('fname').value.trim();
  var telegram = document.getElementById('ftelegram').value.trim();
  var phone    = document.getElementById('fphone').value.trim();
  var btn      = document.getElementById('submitBtn');

  document.getElementById('successMsg').style.display = 'none';
  document.getElementById('errorMsg').style.display   = 'none';

  if (!name)                      { showErr('请填写您的姓名！'); return; }
  if (!telegram)                  { showErr('请填写您的 Telegram ID！'); return; }
  if (!phone || phone.length < 8) { showErr('请填写有效的手机号码！'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span><span class="spinner"></span> 提交中...</span>';

  var trackingId = generateTrackingId();

  var payload = {
    name: name,
    telegram_id: telegram,
    phone: '+60' + phone,
    timestamp: getMYTime(),
    tracking_id: trackingId,
    bot_connected: 'No'
  };

  fetch(MAKE_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(function() {
    document.getElementById('successMsg').style.display = 'flex';
    btn.innerHTML = '<span>已提交</span>';
    setTimeout(function() {
      window.location.href = TG_URL + '?start=' + trackingId;
    }, 2000);
  }).catch(function() {
    showErr('网络错误，请稍后重试。');
    btn.disabled = false;
    btn.innerHTML = '<span>立即提交 SUBMIT</span>';
  });
}

document.addEventListener('keydown', function(e) { if (e.key === 'Enter') handleSubmit(); });
</script>

</body>
</html>
